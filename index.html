<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בעלי תפקידים – קיבוץ עין השלושה</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: #f0f2f0;
    direction: rtl;
    padding-bottom: 32px;
  }

  header {
    background: #2c5f2e;
    color: white;
    text-align: center;
    padding: 20px 16px 16px;
  }

  header h1 { font-size: 20px; margin-bottom: 4px; }
  header p { font-size: 12px; opacity: 0.75; }

  .search-wrap {
    padding: 12px 16px;
    background: #fff;
    border-bottom: 1px solid #ddd;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .search-wrap input {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid #ccc;
    border-radius: 8px;
    font-size: 15px;
    direction: rtl;
    font-family: Arial, sans-serif;
    outline: none;
  }

  .search-wrap input:focus { border-color: #2c5f2e; }

  .cards { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    overflow: hidden;
    border-right: 4px solid #2c5f2e;
  }

  .card.deputy { border-right-color: #7aaa7c; }

  .card-header {
    background: #f7faf7;
    padding: 10px 14px 8px;
    border-bottom: 1px solid #eee;
  }

  .role-title {
    font-size: 15px;
    font-weight: 700;
    color: #1a3d1c;
  }

  .card-body { padding: 10px 14px; }

  .person-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid #f0f0f0;
  }

  .person-row:last-child { border-bottom: none; }

  .person-info { display: flex; flex-direction: column; gap: 1px; }

  .person-label {
    font-size: 11px;
    color: #888;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .person-name { font-size: 15px; color: #1a1a1a; font-weight: 600; }

  .phone-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #2c5f2e;
    color: white;
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 14px;
    font-family: monospace;
    white-space: nowrap;
    direction: ltr;
    flex-shrink: 0;
  }

  .phone-btn:active { background: #1a3d1c; }

  .no-phone {
    font-size: 13px;
    color: #ccc;
    padding: 6px 10px;
  }

  .no-results {
    text-align: center;
    padding: 40px 16px;
    color: #aaa;
    font-size: 15px;
  }

  .count { text-align: center; font-size: 12px; color: #888; margin-top: 4px; }
</style>
</head>
<body>

<header>
  <h1>בעלי תפקידים</h1>
  <p>קיבוץ עין השלושה · עדכון פברואר 2026</p>
</header>

<div class="search-wrap">
  <input type="text" id="searchInput" placeholder="🔍  חיפוש לפי שם או תפקיד..." oninput="filter()">
  <div class="count" id="countLabel"></div>
</div>

<div class="cards" id="cardsContainer"></div>

<script>
const data = [
  { role: 'יו"ר צח"י',             name: 'עופר פקרמן',        phone: '052-3764604', deputy: 'אבירן חסון',    deputyPhone: '050-5071693' },
  { role: 'רבש"צ',                  name: 'מרסלו כהן',         phone: '052-3250018', deputy: 'ניקו פלסיק',    deputyPhone: '054-2503322', deputy2: 'דור בן צור', deputy2Phone: '052-9857049' },
  { role: 'מנהלת הקהילה',           name: 'שירי אביב',         phone: '050-5915535', deputy: '',              deputyPhone: '' },
  { role: 'רפואה',                  name: 'אבי מרום',          phone: '052-8262080', deputy: 'הודיה איתם',   deputyPhone: '054-6224051' },
  { role: 'רווחה',                  name: 'דקלה יסעור',        phone: '052-8105971', deputy: 'יסמין מרום',   deputyPhone: '052-8272080' },
  { role: 'תשתיות וקבלני חוץ',      name: 'ברוכי מרביד',       phone: '052-3925917', deputy: 'חנה פקרמן',    deputyPhone: '054-7915196' },
  { role: 'חינוך',                  name: 'קלייר בשקיר',       phone: '052-3260059', deputy: 'אור ויצמן',    deputyPhone: '058-4347063' },
  { role: 'קישור',                  name: 'גדעון דיאור',       phone: '052-6688854', deputy: '',              deputyPhone: '' },
  { role: 'מידע לציבור',            name: 'שחר זגורי',         phone: '050-2613578', deputy: 'אורלי מזרחי',  deputyPhone: '052-3948088' },
  { role: 'צמ"ד',                   name: 'מריוס דרייר',       phone: '053-7683766', deputy: 'יוסי לוי',     deputyPhone: '054-2415731' },
  { role: 'תרבות',                  name: 'שיין לוי',          phone: '058-4524029', deputy: 'שחף פלסיק',    deputyPhone: '054-6939242' },
  { role: 'צעירים וש"ש',            name: 'פלג קרישבויים',     phone: '053-6274202', deputy: 'מיטל לפלר',    deputyPhone: '052-4501572' },
  { role: 'מזכירות',                name: 'דנה דהרי',          phone: '054-7917871', deputy: 'בת אור לפלר',  deputyPhone: '050-4976470' },
  { role: 'יח"צ',                   name: 'שירי אביב',         phone: '050-5915535', deputy: 'עדיאל פורת',   deputyPhone: '050-3291115' },
  { role: 'מרכז המשק',              name: 'עדיאל פורת',        phone: '050-3291115', deputy: '',              deputyPhone: '' },
  { role: 'גזבר',                   name: 'מנדי',              phone: '054-2569612', deputy: '',              deputyPhone: '' },
  { role: 'הנהל"ח',                 name: 'דומיניק',           phone: '052-4486149', deputy: 'נטלי',         deputyPhone: '050-8710633' },
  { role: 'רכזת פינוי',             name: 'בתיה אונר',         phone: '052-3956913', deputy: 'אלה סוסקין',   deputyPhone: '052-4269798' },
];

function phoneBtn(phone) {
  if (!phone) return '<span class="no-phone">—</span>';
  return `<a class="phone-btn" href="tel:${phone}">📞 ${phone}</a>`;
}

function renderCard(item) {
  const hasDeputy  = item.deputy && item.deputy.trim();
  const hasDeputy2 = item.deputy2 && item.deputy2.trim();

  let deputyRows = '';
  if (hasDeputy) {
    deputyRows += `
      <div class="person-row">
        <div class="person-info">
          <span class="person-label">סגן/ית</span>
          <span class="person-name">${item.deputy}</span>
        </div>
        ${phoneBtn(item.deputyPhone)}
      </div>`;
  }
  if (hasDeputy2) {
    deputyRows += `
      <div class="person-row">
        <div class="person-info">
          <span class="person-label">סגן 2</span>
          <span class="person-name">${item.deputy2}</span>
        </div>
        ${phoneBtn(item.deputy2Phone)}
      </div>`;
  }

  return `
    <div class="card" data-role="${item.role}" data-name="${item.name} ${item.deputy || ''} ${item.deputy2 || ''}">
      <div class="card-header">
        <div class="role-title">${item.role}</div>
      </div>
      <div class="card-body">
        <div class="person-row">
          <div class="person-info">
            <span class="person-label">ממונה</span>
            <span class="person-name">${item.name}</span>
          </div>
          ${phoneBtn(item.phone)}
        </div>
        ${deputyRows}
      </div>
    </div>`;
}

function render(items) {
  const container = document.getElementById('cardsContainer');
  if (!items.length) {
    container.innerHTML = '<div class="no-results">לא נמצאו תוצאות 🔍</div>';
  } else {
    container.innerHTML = items.map(renderCard).join('');
  }
  document.getElementById('countLabel').textContent = `${items.length} תפקידים`;
}

function filter() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!q) { render(data); return; }
  const filtered = data.filter(item =>
    item.role.includes(q) ||
    item.name.toLowerCase().includes(q) ||
    (item.deputy || '').toLowerCase().includes(q) ||
    (item.deputy2 || '').toLowerCase().includes(q)
  );
  render(filtered);
}

render(data);
</script>
</body>
</html>
